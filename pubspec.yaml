name: rally_map_app
description: Rally map app with stage route, closed roads, Street View, and routing.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.14.2
  flutter_google_street_view_v2: ^1.0.1
  # State management
  flutter_bloc: ^9.1.1

  # Data
  gpx: ^2.3.0
  http: ^1.6.0
  equatable: ^2.0.8
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/gpx/
    - assets/images/
